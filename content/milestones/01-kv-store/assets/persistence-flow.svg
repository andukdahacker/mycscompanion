<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <title>Persistence Flow</title>
  <desc>Diagram showing the data persistence flow from in-memory storage to disk file and back during reload</desc>

  <!-- Memory box -->
  <rect x="40" y="60" width="200" height="180" rx="8" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <text x="140" y="45" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="14" font-weight="bold">In-Memory</text>
  <text x="140" y="90" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="13">map[string]string</text>

  <!-- Memory entries -->
  <rect x="60" y="110" width="160" height="28" rx="3" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <text x="75" y="129" fill="#cbd5e1" font-family="monospace" font-size="12">"name" : "Alice"</text>
  <rect x="60" y="146" width="160" height="28" rx="3" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <text x="75" y="165" fill="#cbd5e1" font-family="monospace" font-size="12">"age"  : "30"</text>
  <rect x="60" y="182" width="160" height="28" rx="3" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
  <text x="140" y="201" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">...</text>

  <!-- Disk box -->
  <rect x="480" y="60" width="200" height="180" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="580" y="45" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="14" font-weight="bold">Disk File</text>
  <text x="580" y="90" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="13">data.json</text>

  <!-- File content representation -->
  <text x="500" y="120" fill="#94a3b8" font-family="monospace" font-size="12">{</text>
  <text x="510" y="140" fill="#cbd5e1" font-family="monospace" font-size="11">"name": "Alice",</text>
  <text x="510" y="158" fill="#cbd5e1" font-family="monospace" font-size="11">"age": "30",</text>
  <text x="510" y="176" fill="#64748b" font-family="monospace" font-size="11">...</text>
  <text x="500" y="196" fill="#94a3b8" font-family="monospace" font-size="12">}</text>

  <!-- Save arrow (top, left to right) -->
  <line x1="245" y1="120" x2="475" y2="120" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowSave)"/>
  <rect x="310" y="100" width="100" height="24" rx="4" fill="#4ade80" opacity="0.12"/>
  <text x="360" y="116" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="12" font-weight="bold">SAVE</text>
  <text x="360" y="136" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">serialize to JSON</text>

  <!-- Load arrow (bottom, right to left) -->
  <line x1="475" y1="200" x2="245" y2="200" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowLoad)"/>
  <rect x="310" y="184" width="100" height="24" rx="4" fill="#a78bfa" opacity="0.12"/>
  <text x="360" y="200" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="12" font-weight="bold">LOAD</text>
  <text x="360" y="218" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">parse on startup</text>

  <!-- Flow description -->
  <text x="360" y="290" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Data survives restarts via periodic save + startup reload</text>
  <text x="360" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Write-ahead: memory is always up-to-date; disk is eventual</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowSave" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    </marker>
    <marker id="arrowLoad" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
