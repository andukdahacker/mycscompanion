# REQUIRED REPOSITORY SECRETS:
# ==============================
# - FLY_API_TOKEN: Fly.io API token for registry authentication (Story 3.1)
#   Generate at: https://fly.io/dashboard → Tokens → Create Token

name: Execution Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/fly-execution/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/fly-execution/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: mcc-execution
  FLY_APP: mcc-execution
  GO_VERSION_EXPECTED: '1.23'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: infra/fly-execution
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Go version
        run: |
          GO_VERSION=$(docker run --rm ${{ env.IMAGE_NAME }}:latest go version)
          echo "Go version: $GO_VERSION"
          echo "$GO_VERSION" | grep -q "go${{ env.GO_VERSION_EXPECTED }}" || {
            echo "::error::Expected Go ${{ env.GO_VERSION_EXPECTED }}, got: $GO_VERSION"
            exit 1
          }

      - name: Verify /workspace directory exists
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:latest test -d /workspace || {
            echo "::error::/workspace directory not found"
            exit 1
          }

      - name: Verify non-root runner user exists
        run: |
          docker run --rm --entrypoint id ${{ env.IMAGE_NAME }}:latest runner || {
            echo "::error::runner user not found"
            exit 1
          }

      - name: Verify no network utilities
        run: |
          docker run --rm --entrypoint sh ${{ env.IMAGE_NAME }}:latest -c '! command -v curl && ! command -v wget && ! command -v git && ! command -v ssh' || {
            echo "::error::Network utilities found in image"
            exit 1
          }

      - name: Install flyctl
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Push to Fly.io registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth docker
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} registry.fly.io/${{ env.FLY_APP }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:latest registry.fly.io/${{ env.FLY_APP }}:latest
          docker push registry.fly.io/${{ env.FLY_APP }}:${{ github.sha }}
          docker push registry.fly.io/${{ env.FLY_APP }}:latest
